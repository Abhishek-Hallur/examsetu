services:
  postgres:
    image: postgres:16-alpine
    container_name: examsetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: examsetu
      POSTGRES_PASSWORD: examsetu
      POSTGRES_DB: examsetu
    ports:
      - "5432:5432"
    volumes:
      - examsetu-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examsetu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: examsetu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - examsetu-redisdata:/data

volumes:
  examsetu-pgdata:
  examsetu-redisdata:
